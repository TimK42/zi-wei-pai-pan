<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>зҙ«еҫ®ж–—ж•ёжҺ’зӣӨ</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/iztro@2.4.7/dist/iztro.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#ddd2bc;color:#222;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","Microsoft JhengHei",sans-serif;padding:16px;min-height:100vh;font-weight:400}
.container{max-width:900px;margin:0 auto}
header{text-align:center;padding:16px 0 8px}
header h1{font-size:1.5rem;font-weight:700;color:#3a5f95;margin-bottom:4px}
header p{font-size:.85rem;color:#888}

/* Form Card */
.form-card{background:#dcc8a8;border-radius:12px;padding:16px;box-shadow:0 1px 6px rgba(0,0,0,.08);margin-bottom:16px}
.form-card label{font-weight:500;font-size:.85rem;color:#555;margin-bottom:2px}
.form-card .form-select,.form-card .form-control{font-size:.85rem;background:#f2e8d8}
.form-row{display:flex;flex-wrap:wrap;gap:8px;align-items:end}
.form-row .field{flex:1;min-width:100px}
.form-row .field-sm{flex:0 0 auto}
.prediction-bar .time-input select,.prediction-bar .time-input input.form-control{background:#f2e8d8}

/* Chart Grid */
.chart-grid{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr);gap:0;margin-bottom:16px;border:2px solid #8a7a68;border-radius:8px;overflow:hidden}
.palace-cell{background:#d0b898;border:1px solid #8a7a68;border-radius:0;padding:6px 4px;min-height:140px;font-size:.78rem;line-height:1.35;position:relative;overflow:hidden}
.palace-cell .palace-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;padding-bottom:3px;border-bottom:2px solid #8a7a68}
.palace-cell .palace-name{font-weight:700;font-size:.85rem;color:#3a5f95}
.palace-cell .palace-branch{font-size:.65rem;color:#7a7060}
.star{display:inline-block;margin-right:1px;font-size:.75rem}
.star.major{font-weight:600;color:#1a1a1a}
.star.minor{color:#555}
.star.adjunct{color:#6a6050;font-size:.7rem}
.star .brightness{color:#b8853a;font-size:.6rem}
.star .transformed{font-weight:700;font-size:.6rem;display:inline}
.star .self-transform{color:#b8860b;font-size:.58rem;font-weight:600;margin-left:1px}
.transformed.зҘҝ{color:#2a7d2a}
.transformed.ж¬Ҡ{color:#2a5da8}
.transformed.з§‘{color:#8a4a9a}
.transformed.еҝҢ{color:#c33}

/* Flow еӣӣеҢ– markers on stars */
.flow-mutagen{font-weight:700;font-size:.6rem;display:inline;margin-left:1px}
.flow-mutagen.flowyear{color:#8e44ad}
.flow-mutagen.flowmonth{color:#16a085}
.flow-mutagen.flowday{color:#d35400}
.flow-mutagen.flowhour{color:#d43370}

/* Horoscope overlay */
.horo-info{font-size:.62rem;margin-top:2px;padding-top:1px;display:none;color:#666}
.horo-info.show{display:block}
.horo-info .horo-label{color:#4a6fa5;font-weight:600}
.horo-info .horo-value{color:#a0522d}
.horo-info.daxian .horo-label,.horo-info.daxian .horo-value{color:#c0392b}
.horo-info.xiaoxian .horo-label,.horo-info.xiaoxian .horo-value{color:#27ae60}
.horo-info.flowyear .horo-label,.horo-info.flowyear .horo-value{color:#8e44ad}
.horo-info.flowmonth .horo-label,.horo-info.flowmonth .horo-value{color:#16a085}
.horo-info.flowday .horo-label,.horo-info.flowday .horo-value{color:#d35400}
.horo-info.flowhour .horo-label,.horo-info.flowhour .horo-value{color:#d43370}

/* Center cells */
.center-cell{background:#d0b898;border:1px solid #8a7a68;border-radius:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:.78rem;color:#6a6050;line-height:1.5;text-align:center;padding:4px}
.center-cell .main-info{color:#3a5f95;font-weight:700;font-size:.95rem}
.center-cell .sub-info{font-size:.68rem;color:#6a6050}
.center-cell .year-col{font-size:.9rem;font-weight:600;color:#3a5f95}

/* Prediction Bar */
.prediction-bar{padding:4px 0 0;border-top:1px solid #e0d8cc;margin-top:12px;display:flex;flex-wrap:wrap;align-items:center;gap:8px}
.prediction-bar .time-label{font-weight:600;font-size:.85rem;color:#555;white-space:nowrap}
.prediction-bar .time-input{flex:0 0 auto}
.prediction-bar .time-input select{font-size:.78rem;padding:2px 6px;border:1px solid #ddd;border-radius:6px}

.horo-checkboxes{display:flex;flex-wrap:wrap;gap:4px;margin-left:4px}
.horo-check{display:none}
.horo-label-btn{display:inline-block;padding:4px 10px;font-size:.78rem;border:1px solid #d0c8bc;border-radius:16px;background:#f2e8d8;color:#666;cursor:pointer;transition:all .15s;user-select:none;white-space:nowrap}
.horo-label-btn:hover{background:#e8dcc8;border-color:#b8a89a}
#chkDaxian:checked+.horo-label-btn{background:#c0392b;color:#fff;border-color:#a93226}
#chkXiaoxian:checked+.horo-label-btn{background:#27ae60;color:#fff;border-color:#1e8449}
#chkFlowYear:checked+.horo-label-btn{background:#8e44ad;color:#fff;border-color:#7d3c98}
#chkFlowMonth:checked+.horo-label-btn{background:#16a085;color:#fff;border-color:#138d75}
#chkFlowDay:checked+.horo-label-btn{background:#d35400;color:#fff;border-color:#ba4a00}
#chkFlowHour:checked+.horo-label-btn{background:#d43370;color:#fff;border-color:#bb2d5e}
.horo-check:checked+.horo-label-btn{background:#4a6fa5;color:#fff;border-color:#3a5f95}

/* Alert */
.alert-msg{text-align:center;padding:12px;color:#c33;font-size:.85rem;display:none}
.alert-msg.show{display:block}

/* Footer */
footer{text-align:center;font-size:.72rem;color:#aaa;padding:12px 0}

@media(max-width:600px){
  .palace-cell{min-height:110px;font-size:.65rem;padding:4px 3px}
  .palace-cell .palace-name{font-size:.7rem}
  .star{font-size:.62rem}
  .horo-info{font-size:.55rem}
  .prediction-bar{flex-direction:column;align-items:stretch}
  .prediction-bar .time-input{flex:1}
}
</style>
</head>
<body>

<div class="container">

<header>
  <h1><i class="bi bi-moon-stars"></i> зҙ«еҫ®ж–—ж•ёжҺ’зӣӨ</h1>
  <p>еҹәж–ј iztro еј•ж“Һ В· зҙ”еүҚз«Ҝйӣўз·ҡйҒӢз®—</p>
</header>

<div class="form-card">
  <div class="form-row">
    <div class="field">
      <label>жҖ§еҲҘ</label>
      <div>
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="radio" name="gender" id="genderM" value="1" checked>
          <label class="form-check-label" for="genderM">з”·</label>
        </div>
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="radio" name="gender" id="genderF" value="0">
          <label class="form-check-label" for="genderF">еҘі</label>
        </div>
      </div>
    </div>
    <div class="field">
      <label>еҮәз”ҹж—Ҙжңҹ</label>
      <input type="date" class="form-control form-control-sm" id="birthDate" value="1982-11-11">
    </div>
    <div class="field">
      <label>еҮәз”ҹжҷӮй–“</label>
      <select class="form-select form-select-sm" id="birthHour">
      <option value="0">00:00-01:00 ж—©еӯҗ</option>
      <option value="1">01:00-03:00 дё‘</option>
      <option value="2">03:00-05:00 еҜ…</option>
      <option value="3">05:00-07:00 еҚҜ</option>
      <option value="4">07:00-09:00 иҫ°</option>
      <option value="5">09:00-11:00 е·і</option>
      <option value="6">11:00-13:00 еҚҲ</option>
      <option value="7">13:00-15:00 жңӘ</option>
      <option value="8">15:00-17:00 з”і</option>
      <option value="9">17:00-19:00 й…ү</option>
      <option value="10">19:00-21:00 жҲҢ</option>
      <option value="11" selected>21:00-23:00 дәҘ</option>
      <option value="12">23:00-00:00 еӨңеӯҗ</option>
      </select>
    </div>
    <div class="field-sm" style="padding-top:20px">
      <button class="btn btn-primary btn-sm" id="calcBtn"><i class="bi bi-calculator"></i> жҺ’зӣӨ</button>
    </div>
  </div>
  <div class="prediction-bar">
  <span class="time-label"><i class="bi bi-clock"></i> зӣ®жЁҷжҷӮй–“</span>
  <span class="time-input">
    <input type="date" id="targetDate" class="form-control form-control-sm" style="width:auto;display:inline-block">
  </span>
  <span class="time-input">
    <select id="targetHour" style="width:auto">
      <option value="0">00:00 ж—©еӯҗ</option>
      <option value="1">01:00 дё‘</option>
      <option value="2">03:00 еҜ…</option>
      <option value="3">05:00 еҚҜ</option>
      <option value="4">07:00 иҫ°</option>
      <option value="5">09:00 е·і</option>
      <option value="6">11:00 еҚҲ</option>
      <option value="7">13:00 жңӘ</option>
      <option value="8">15:00 з”і</option>
      <option value="9">17:00 й…ү</option>
      <option value="10">19:00 жҲҢ</option>
      <option value="11">21:00 дәҘ</option>
      <option value="12">23:00 еӨңеӯҗ</option>
    </select>
  </span>
  <button class="btn btn-outline-secondary btn-sm" id="prevHourBtn"><i class="bi bi-chevron-left"></i> дёҠдёҖеҖӢ</button>
  <button class="btn btn-outline-secondary btn-sm" id="nextHourBtn">дёӢдёҖеҖӢ <i class="bi bi-chevron-right"></i></button>
  <span class="horo-checkboxes">
    <input type="checkbox" class="horo-check" id="chkDaxian">
    <label class="horo-label-btn" for="chkDaxian">еӨ§йҷҗ</label>
    <input type="checkbox" class="horo-check" id="chkXiaoxian">
    <label class="horo-label-btn" for="chkXiaoxian">е°Ҹйҷҗ</label>
    <input type="checkbox" class="horo-check" id="chkFlowYear">
    <label class="horo-label-btn" for="chkFlowYear">жөҒе№ҙ</label>
    <input type="checkbox" class="horo-check" id="chkFlowMonth">
    <label class="horo-label-btn" for="chkFlowMonth">жөҒжңҲ</label>
    <input type="checkbox" class="horo-check" id="chkFlowDay">
    <label class="horo-label-btn" for="chkFlowDay">жөҒж—Ҙ</label>
    <input type="checkbox" class="horo-check" id="chkFlowHour">
    <label class="horo-label-btn" for="chkFlowHour">жөҒжҷӮ</label>
    <input type="checkbox" class="horo-check" id="chkZihua" checked>
    <label class="horo-label-btn" for="chkZihua">еӣӣеҢ–</label>
    <input type="checkbox" class="horo-check" id="chkSelfTransform">
    <label class="horo-label-btn" for="chkSelfTransform">иҮӘеҢ–</label>
  </span>
</div>
</div>

<div class="alert-msg" id="alertMsg"></div>

<div class="chart-grid" id="chartGrid"></div>

<footer>
  иЁҲз®—еј•ж“Һ <a href="https://github.com/SylarLong/iztro" target="_blank" rel="noopener">iztro</a> В·
  зҙ”еүҚз«Ҝйӣўз·ҡйҒӢз®—пјҢдёҚеӮійҖҒд»»дҪ•иіҮж–ҷ
</footer>

</div>

<script>
// в”Җв”Җв”Җ Constants в”Җв”Җв”Җ
const BRANCH_TO_INDEX = {'еӯҗ':0,'дё‘':1,'еҜ…':2,'еҚҜ':3,'иҫ°':4,'е·і':5,'еҚҲ':6,'жңӘ':7,'з”і':8,'й…ү':9,'жҲҢ':10,'дәҘ':11};
// Branch index вҶ’ grid (row, col) in 4Г—4 chart
const BRANCH_GRID = [
  [3,2],[3,1],[3,0],  // еӯҗдё‘еҜ…
  [2,0],[1,0],[0,0],  // еҚҜиҫ°е·і
  [0,1],[0,2],[0,3],  // еҚҲжңӘз”і
  [1,3],[2,3],[3,3]   // й…үжҲҢдәҘ
];
// еӣӣеҢ–и§„еҲҷ: еӨ©е№І вҶ’ { жҳҹеҗҚ: еҢ–зҘҝ/ж¬Ҡ/з§‘/еҝҢ }
const SELF_TRANSFORM_RULES = {
  'з”І':{'е»үиІһ':'зҘҝ','з ҙи»Қ':'ж¬Ҡ','жӯҰжӣІ':'з§‘','еӨӘйҷҪ':'еҝҢ'},
  'д№ҷ':{'еӨ©ж©ҹ':'зҘҝ','еӨ©жўҒ':'ж¬Ҡ','зҙ«еҫ®':'з§‘','еӨӘйҷ°':'еҝҢ'},
  'дёҷ':{'еӨ©еҗҢ':'зҘҝ','еӨ©ж©ҹ':'ж¬Ҡ','ж–ҮжҳҢ':'з§‘','е»үиІһ':'еҝҢ'},
  'дёҒ':{'еӨӘйҷ°':'зҘҝ','еӨ©еҗҢ':'ж¬Ҡ','еӨ©ж©ҹ':'з§‘','е·Ёй–Җ':'еҝҢ'},
  'жҲҠ':{'иІӘзӢј':'зҘҝ','еӨӘйҷ°':'ж¬Ҡ','еҸіејј':'з§‘','еӨ©ж©ҹ':'еҝҢ'},
  'е·ұ':{'жӯҰжӣІ':'зҘҝ','иІӘзӢј':'ж¬Ҡ','еӨ©жўҒ':'з§‘','ж–ҮжӣІ':'еҝҢ'},
  'еәҡ':{'еӨӘйҷҪ':'зҘҝ','жӯҰжӣІ':'ж¬Ҡ','еӨӘйҷ°':'з§‘','еӨ©еҗҢ':'еҝҢ'},
  'иҫӣ':{'е·Ёй–Җ':'зҘҝ','еӨӘйҷҪ':'ж¬Ҡ','ж–ҮжӣІ':'з§‘','ж–ҮжҳҢ':'еҝҢ'},
  'еЈ¬':{'еӨ©жўҒ':'зҘҝ','зҙ«еҫ®':'ж¬Ҡ','е·Ұиј”':'з§‘','жӯҰжӣІ':'еҝҢ'},
  'зҷё':{'з ҙи»Қ':'зҘҝ','е·Ёй–Җ':'ж¬Ҡ','еӨӘйҷ°':'з§‘','иІӘзӢј':'еҝҢ'},
};

const HORO_KEYS = [
  { key: 'decadal', id: 'chkDaxian', cls: 'daxian', label: 'еӨ§йҷҗ' },
  { key: 'age',     id: 'chkXiaoxian', cls: 'xiaoxian', label: 'е°Ҹйҷҗ' },
  { key: 'yearly',  id: 'chkFlowYear', cls: 'flowyear', label: 'жөҒе№ҙ' },
  { key: 'monthly', id: 'chkFlowMonth', cls: 'flowmonth', label: 'жөҒжңҲ' },
  { key: 'daily',   id: 'chkFlowDay', cls: 'flowday', label: 'жөҒж—Ҙ' },
  { key: 'hourly',  id: 'chkFlowHour', cls: 'flowhour', label: 'жөҒжҷӮ' },
];

// в”Җв”Җв”Җ Globals в”Җв”Җв”Җ
let astrolabe = null;
let horoscopeResult = null;

// в”Җв”Җв”Җ Build Grid в”Җв”Җв”Җ
function buildGrid() {
  const grid = document.getElementById('chartGrid');
  grid.innerHTML = '';
  for (let r = 0; r < 4; r++) {
    for (let c = 0; c < 4; c++) {
      if ((r===1||r===2) && (c===1||c===2)) {
        const center = document.createElement('div');
        center.className = 'center-cell';
        center.id = 'center_'+r+'_'+c;
        center.innerHTML = 'вҖ”';
        grid.appendChild(center);
      } else {
        // Find branch index for this grid pos
        let branchIdx = -1;
        for (let b = 0; b < 12; b++) {
          if (BRANCH_GRID[b][0] === r && BRANCH_GRID[b][1] === c) {
            branchIdx = b;
            break;
          }
        }
        const cell = document.createElement('div');
        cell.className = 'palace-cell';
        cell.dataset.branch = branchIdx;
        cell.innerHTML =
          '<div class="palace-header"><span class="palace-name"></span><span class="palace-branch"></span></div>' +
          '<div class="stars-area"></div>' +
          HORO_KEYS.map(h => '<div class="horo-info '+h.cls+'"></div>').join('');
        grid.appendChild(cell);
      }
    }
  }
}

// в”Җв”Җв”Җ Find Cell by Branch в”Җв”Җв”Җ
function getCell(branchIdx) {
  return document.querySelector('.palace-cell[data-branch="'+branchIdx+'"]');
}

// в”Җв”Җв”Җ Render Chart в”Җв”Җв”Җ
function renderChart(a) {
  if (!a) return;
  astrolabe = a;

  // Build palace lookup by earthly branch
  const palaceByBranch = {};
  a.palaces.forEach(p => {
    const idx = BRANCH_TO_INDEX[p.earthlyBranch];
    if (idx !== undefined) palaceByBranch[idx] = p;
  });

  // Render each palace cell
  for (let b = 0; b < 12; b++) {
    const cell = getCell(b);
    if (!cell) continue;
    const p = palaceByBranch[b];
    if (!p) continue;

    // Header
    cell.querySelector('.palace-name').textContent = p.name;
    cell.querySelector('.palace-branch').textContent = p.heavenlyStem + p.earthlyBranch;

    // Stars
    const sa = cell.querySelector('.stars-area');
    sa.innerHTML = '';
    const allStars = [...p.majorStars, ...p.minorStars, ...p.adjectiveStars];
    allStars.forEach(s => {
      const span = document.createElement('span');
      span.className = 'star ' + s.type;
      span.textContent = s.name;
      if (s.brightness) {
        const br = document.createElement('span');
        br.className = 'brightness';
        br.textContent = s.brightness;
        span.appendChild(br);
      }
      if (s.mutagen) {
        const tr = document.createElement('span');
        tr.className = 'transformed ' + s.mutagen;
        tr.textContent = s.mutagen;
        span.appendChild(tr);
      }
      // иҮӘеҢ– marker
      const rules = p.heavenlyStem ? SELF_TRANSFORM_RULES[p.heavenlyStem] : null;
      if (rules && rules[s.name]) {
        const st = document.createElement('span');
        st.className = 'self-transform';
        st.textContent = 'иҮӘ' + rules[s.name];
        st.style.display = 'none'; // hidden until иҮӘеҢ– toggle on
        span.appendChild(st);
      }
      sa.appendChild(span);
      sa.appendChild(document.createTextNode(' '));
    });
  }

  // Center cells
  const c00 = document.getElementById('center_1_1');
  const c01 = document.getElementById('center_1_2');
  const c10 = document.getElementById('center_2_1');
  const c11 = document.getElementById('center_2_2');
  
  // Chinese four pillars
  const pillars = a.chineseDate ? a.chineseDate.split(' ') : [];
  // rawDates.chineseDate has structure
  const raw = a.rawDates?.chineseDate;
  
  if (c00) {
    c00.innerHTML = '<span class="main-info">'+ (a.lunarDate||'') +'</span>' +
      '<span class="sub-info">'+ (a.sign||'') +' В· '+ (a.zodiac||'') +'</span>';
  }
  if (c01) {
    const yearPillar = raw?.yearly ? raw.yearly.join('') : pillars[0]||'';
    const monthPillar = raw?.monthly ? raw.monthly.join('') : pillars[1]||'';
    const dayPillar = raw?.daily ? raw.daily.join('') : pillars[2]||'';
    const hourPillar = raw?.hourly ? raw.hourly.join('') : pillars[3]||'';
    c01.innerHTML = '<span class="year-col">'+ yearPillar +'е№ҙ '+ monthPillar +'жңҲ</span><br><span class="year-col">'+ dayPillar +'ж—Ҙ '+ hourPillar +'жҷӮ</span>';
  }
  if (c10) {
    c10.innerHTML = '<span class="main-info">'+ (a.fiveElementsClass||'') +'</span>' +
      '<span class="sub-info">'+ (a.soul||'') +' В· иә«('+ a.earthlyBranchOfBodyPalace +')</span>' +
      '<span class="sub-info">'+ (a.body||'') +'</span>';
  }
  if (c11) {
    // зӣ®жЁҷжҷӮй–“пјҲиҲҮдёӢжӢүйҒёе–®дёҖиҮҙпјү
    const dt = document.getElementById('targetDate')?.value || '';
    const hourSel = document.getElementById('targetHour');
    const hourText = hourSel ? hourSel.options[hourSel.selectedIndex]?.text || '' : '';
    const dateStr = dt.replace(/-/g, '/');
    c11.innerHTML = '<span class="main-info" style="font-size:.82rem">'+ dateStr +'</span>' +
      '<span class="year-col" style="font-size:.8rem">'+ hourText +'</span>';
  }
}

// в”Җв”Җв”Җ Update Horoscope в”Җв”Җв”Җ
function updateHoroscope(targetDateStr) {
  const horoEls = document.querySelectorAll('.horo-info');
  horoEls.forEach(el => { el.innerHTML = ''; });

  if (!astrolabe || !targetDateStr) return;

  try {
    const result = astrolabe.horoscope(targetDateStr);
    horoscopeResult = result;
  } catch(e) {
    console.error('horoscope error:', e);
    return;
  }

  // еӨ§йҷҗ (decadal): show ALL palaces' decade info
  const decadalScope = horoscopeResult.decadal;
  if (decadalScope && astrolabe.palaces) {
    astrolabe.palaces.forEach((palace, idx) => {
      if (!palace.decadal || !palace.decadal.range) return;
      const branchIdx = BRANCH_TO_INDEX[palace.earthlyBranch];
      if (branchIdx === undefined) return;
      const cell = getCell(branchIdx);
      if (!cell) return;
      const infoEl = cell.querySelector('.horo-info.daxian');
      if (!infoEl) return;

      let content = '<span class="horo-label">еӨ§йҷҗ</span> ';
      if (decadalScope.index === idx) {
        content += '<span class="horo-value" style="font-weight:700">' +
          (decadalScope.heavenlyStem || '') + (decadalScope.earthlyBranch || '') + '</span>';
      }
      content += ' <span class="horo-value">' + palace.decadal.range[0] + '-' + palace.decadal.range[1] + 'жӯІ</span>';
      infoEl.innerHTML = content;
    });
  }

  // Other scope types
  HORO_KEYS.forEach(hk => {
    if (hk.key === 'decadal') return; // already handled above

    // е°Ҹйҷҗ: show age list for ALL palaces (12-year cycle)
    if (hk.key === 'age') {
      const ageScope = horoscopeResult.age;
      if (!ageScope) return;
      astrolabe.palaces.forEach((palace, idx) => {
        if (!palace.ages || palace.ages.length === 0) return;
        const branchIdx = BRANCH_TO_INDEX[palace.earthlyBranch];
        if (branchIdx === undefined) return;
        const cell = getCell(branchIdx);
        if (!cell) return;
        const infoEl = cell.querySelector('.horo-info.xiaoxian');
        if (!infoEl) return;

        // Format ages as comma-separated list, capped at ages вүӨ 110
        const displayAges = palace.ages.filter(a => a <= 110).join(', ');
        let content = '<span class="horo-label">е°Ҹйҷҗ</span> ';
        const isCurrent = idx === ageScope.index;
        const valueStyle = isCurrent ? 'font-weight:700' : '';
        content += '<span class="horo-value" style="' + valueStyle + '">' + displayAges + 'жӯІ</span>';
        infoEl.innerHTML = content;
      });
      return;
    }

    // Flow cycle scopes (жөҒе№ҙ/жңҲ/ж—Ҙ/жҷӮ): show ALL palaces with role names
    const scope = horoscopeResult[hk.key];
    if (!scope || scope.index === undefined || scope.index < 0) return;

    const FLOW_ROLES_CLOCKWISE = ['е‘Ҫе®®','зҲ¶жҜҚ','зҰҸеҫ·','з”°е®…','е®ҳзҘҝ','еғ•еҪ№','йҒ·з§»','з–ҫеҺ„','иІЎеёӣ','еӯҗеҘі','еӨ«еҰ»','е…„ејҹ'];
    const startPalace = astrolabe.palaces[scope.index];
    const startBranch = BRANCH_TO_INDEX[startPalace.earthlyBranch];
    if (startBranch === undefined) return;

    // Precompute value for the starting palace
    let startContent = '<span class="horo-label">' + hk.label + '</span> ';
    startContent += '<span class="horo-value">' + (scope.heavenlyStem || '') + (scope.earthlyBranch || '') + '</span>';
    if (scope.mutagen && scope.mutagen.length) {
      const m = scope.mutagen;
      let mStr = '';
      if (Array.isArray(m)) {
        const names = m.map(x => x.name || x.star || '').filter(Boolean).join(',');
        if (names) mStr = names;
      }
      if (mStr) startContent += ' <span class="horo-label">еӣӣеҢ–: </span><span class="horo-value">' + mStr + '</span>';
    }

    astrolabe.palaces.forEach((palace) => {
      const branchIdx = BRANCH_TO_INDEX[palace.earthlyBranch];
      if (branchIdx === undefined) return;
      const cell = getCell(branchIdx);
      if (!cell) return;
      const infoEl = cell.querySelector('.horo-info.' + hk.cls);
      if (!infoEl) return;

      const offset = (branchIdx - startBranch + 12) % 12;
      if (offset === 0) {
        infoEl.innerHTML = startContent;
      } else {
        infoEl.innerHTML = '<span class="horo-value">' + FLOW_ROLES_CLOCKWISE[offset] + '</span>';
      }
    });

    // Clear ALL existing flow еӣӣеҢ– markers for this flow type (prevents stale markers after recalc)
    document.querySelectorAll('.flow-mutagen.' + hk.cls).forEach(el => el.remove());

    // Add flow еӣӣеҢ– markers to stars
    if (scope.heavenlyStem && scope.mutagen && Array.isArray(scope.mutagen) && scope.mutagen.length) {
      const rules = SELF_TRANSFORM_RULES[scope.heavenlyStem];
      scope.mutagen.forEach(starName => {
        if (!starName || !rules || !rules[starName]) return;
        const mutagenType = rules[starName]; // зҘҝ/ж¬Ҡ/з§‘/еҝҢ
        // Find this star in palace cells and add flow-colored marker
        astrolabe.palaces.forEach(palace => {
          const hasStar = palace.majorStars?.some(s => s.name === starName)
                       || palace.minorStars?.some(s => s.name === starName);
          if (!hasStar) return;
          const bIdx = BRANCH_TO_INDEX[palace.earthlyBranch];
          const cell = getCell(bIdx);
          if (!cell) return;
          const starEls = cell.querySelectorAll('.star');
          for (const se of starEls) {
            if (se.textContent.trim().startsWith(starName)) {
              // Remove existing marker for this flow type
              const old = se.querySelector('.flow-mutagen.' + hk.cls);
              if (old) old.remove();
              // Add new marker
              const fm = document.createElement('span');
              fm.className = 'flow-mutagen ' + hk.cls;
              fm.textContent = mutagenType;
              // Visibility: follow flow checkbox state
              const cb = document.getElementById(hk.id);
              fm.style.display = (cb && cb.checked) ? 'inline' : 'none';
              se.appendChild(fm);
              break;
            }
          }
        });
      });
    }
  });
}

// в”Җв”Җв”Җ Toggles в”Җв”Җв”Җ
function setupToggles() {
  HORO_KEYS.forEach(hk => {
    const cb = document.getElementById(hk.id);
    if (!cb) return;
    cb.addEventListener('change', function() {
      document.querySelectorAll('.horo-info.' + hk.cls).forEach(el => {
        el.classList.toggle('show', this.checked);
      });
      // Also toggle flow еӣӣеҢ– markers on stars
      document.querySelectorAll('.flow-mutagen.' + hk.cls).forEach(el => {
        el.style.display = this.checked ? 'inline' : 'none';
      });
    });
  });
  // еӣӣеҢ– toggle: show/hide .transformed
  const chkZihua = document.getElementById('chkZihua');
  if (chkZihua) {
    chkZihua.addEventListener('change', function() {
      document.querySelectorAll('.transformed').forEach(el => {
        el.style.display = this.checked ? 'inline' : 'none';
      });
    });
  }
  // иҮӘеҢ– toggle: show/hide .self-transform
  const chkSelf = document.getElementById('chkSelfTransform');
  if (chkSelf) {
    chkSelf.addEventListener('change', function() {
      document.querySelectorAll('.self-transform').forEach(el => {
        el.style.display = this.checked ? 'inline' : 'none';
      });
    });
  }
}



// в”Җв”Җв”Җ Calculate в”Җв”Җв”Җ
function calculate() {
  const gender = document.querySelector('input[name="gender"]:checked').value;
  const birthDate = document.getElementById('birthDate').value;
  const birthHour = parseInt(document.getElementById('birthHour').value);
  const alertEl = document.getElementById('alertMsg');
  alertEl.classList.remove('show');
  if (!birthDate) { alertEl.textContent = 'и«ӢйҒёж“ҮеҮәз”ҹж—Ҙжңҹ'; alertEl.classList.add('show'); return; }
  try {
    const a = iztro.astro.bySolar(birthDate, birthHour, gender === '1' ? 'з”·' : 'еҘі', true, 'zh-TW');
    renderChart(a);
    runPrediction(true);
  } catch(e) {
    console.error(e);
    alertEl.textContent = 'жҺ’зӣӨйҢҜиӘӨпјҡ'+e.message;
    alertEl.classList.add('show');
  }
}

function runPrediction(force) {
  if (!astrolabe) return;
  const targetDate = document.getElementById('targetDate').value;
  if (!targetDate) return;
  const branchIdx = parseInt(document.getElementById('targetHour').value);
  const startHour = branchIdx === 0 ? 0 : branchIdx === 12 ? 23 : branchIdx * 2 - 1;
  updateHoroscope(targetDate + ' ' + String(startHour).padStart(2,'0') + ':00');
  // Re-apply toggle states
  HORO_KEYS.forEach(hk => {
    const cb = document.getElementById(hk.id);
    if (cb && cb.checked) {
      document.querySelectorAll('.horo-info.'+hk.cls).forEach(el => el.classList.add('show'));
      document.querySelectorAll('.flow-mutagen.'+hk.cls).forEach(el => { el.style.display = 'inline'; });
    }
  });
  // Re-apply еӣӣеҢ– / иҮӘеҢ– states
  if (document.getElementById('chkZihua').checked) {
    document.querySelectorAll('.transformed').forEach(el => { el.style.display = 'inline'; });
  }
  if (document.getElementById('chkSelfTransform').checked) {
    document.querySelectorAll('.self-transform').forEach(el => { el.style.display = 'inline'; });
  }
}

// в”Җв”Җв”Җ Init в”Җв”Җв”Җ
document.addEventListener('DOMContentLoaded', function() {
  buildGrid();
  setupToggles();

  document.getElementById('calcBtn').addEventListener('click', calculate);
  document.getElementById('targetDate').addEventListener('change', function() { runPrediction(); });
  document.getElementById('targetHour').addEventListener('change', function() { runPrediction(false); });

  const now = new Date();
  const todayStr = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
  document.getElementById('targetDate').value = todayStr;
  // Snap current hour to жҷӮиҫ° index (0-12)
  const h24 = now.getHours();
  const snapIndex = h24 === 0 ? 0 : h24 === 23 ? 12 : Math.floor((h24 + 1) / 2);
  document.getElementById('targetHour').value = snapIndex;
  calculate();
});

// в”Җв”Җв”Җ дёҠдёҖеҖӢ / дёӢдёҖеҖӢ жҷӮиҫ°жҢүйҲ• в”Җв”Җв”Җ
document.getElementById('prevHourBtn').addEventListener('click', function() {
  const sel = document.getElementById('targetHour');
  const dateInput = document.getElementById('targetDate');
  const curVal = parseInt(sel.value);
  const maxVal = 12;
  if (curVal === 0) {
    // еҫһж—©еӯҗи·Ёж—ҘеҲ°еүҚдёҖеӨ©зҡ„еӨңеӯҗ
    sel.value = maxVal;
    const d = new Date(dateInput.value);
    d.setDate(d.getDate() - 1);
    dateInput.value = d.toISOString().slice(0, 10);
  } else {
    sel.value = curVal - 1;
  }
  calculate();
});

document.getElementById('nextHourBtn').addEventListener('click', function() {
  const sel = document.getElementById('targetHour');
  const dateInput = document.getElementById('targetDate');
  const curVal = parseInt(sel.value);
  const maxVal = 12;
  if (curVal === maxVal) {
    // еҫһеӨңеӯҗи·Ёж—ҘеҲ°еҫҢдёҖеӨ©зҡ„ж—©еӯҗ
    sel.value = 0;
    const d = new Date(dateInput.value);
    d.setDate(d.getDate() + 1);
    dateInput.value = d.toISOString().slice(0, 10);
  } else {
    sel.value = curVal + 1;
  }
  calculate();
});
</script>
