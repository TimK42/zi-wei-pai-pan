*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#ddd2bc;color:#222;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","Microsoft JhengHei",sans-serif;padding:16px;min-height:100vh;font-weight:400}

<script>
// ─── Constants ───
const BRANCH_TO_INDEX = {'子':0,'丑':1,'寅':2,'卯':3,'辰':4,'巳':5,'午':6,'未':7,'申':8,'酉':9,'戌':10,'亥':11};
// Branch index → grid (row, col) in 4×4 chart
const BRANCH_GRID = [
  [3,2],[3,1],[3,0],  // 子丑寅
  [2,0],[1,0],[0,0],  // 卯辰巳
  [0,1],[0,2],[0,3],  // 午未申
  [1,3],[2,3],[3,3]   // 酉戌亥
];
// 四化规则: 天干 → { 星名: 化祿/權/科/忌 }
const SELF_TRANSFORM_RULES = {
  '甲':{'廉貞':'祿','破軍':'權','武曲':'科','太陽':'忌'},
  '乙':{'天機':'祿','天梁':'權','紫微':'科','太陰':'忌'},
  '丙':{'天同':'祿','天機':'權','文昌':'科','廉貞':'忌'},
  '丁':{'太陰':'祿','天同':'權','天機':'科','巨門':'忌'},
  '戊':{'貪狼':'祿','太陰':'權','右弼':'科','天機':'忌'},
  '己':{'武曲':'祿','貪狼':'權','天梁':'科','文曲':'忌'},
  '庚':{'太陽':'祿','武曲':'權','太陰':'科','天同':'忌'},
  '辛':{'巨門':'祿','太陽':'權','文曲':'科','文昌':'忌'},
  '壬':{'天梁':'祿','紫微':'權','左輔':'科','武曲':'忌'},
  '癸':{'破軍':'祿','巨門':'權','太陰':'科','貪狼':'忌'},
};

const HORO_KEYS = [
  { key: 'decadal', id: 'chkDaxian', cls: 'daxian', label: '大限' },
  { key: 'age',     id: 'chkXiaoxian', cls: 'xiaoxian', label: '小限' },
  { key: 'yearly',  id: 'chkFlowYear', cls: 'flowyear', label: '流年' },
  { key: 'monthly', id: 'chkFlowMonth', cls: 'flowmonth', label: '流月' },
  { key: 'daily',   id: 'chkFlowDay', cls: 'flowday', label: '流日' },
  { key: 'hourly',  id: 'chkFlowHour', cls: 'flowhour', label: '流時' },
];

// ─── Globals ───
let astrolabe = null;
let horoscopeResult = null;

// ─── Build Grid ───
function buildGrid() {
  const grid = document.getElementById('chartGrid');
  grid.innerHTML = '';
  for (let r = 0; r < 4; r++) {
    for (let c = 0; c < 4; c++) {
      if ((r===1||r===2) && (c===1||c===2)) {
        const center = document.createElement('div');
        center.className = 'center-cell';
        center.id = 'center_'+r+'_'+c;
        center.innerHTML = '—';
        grid.appendChild(center);
      } else {
        // Find branch index for this grid pos
        let branchIdx = -1;
        for (let b = 0; b < 12; b++) {
          if (BRANCH_GRID[b][0] === r && BRANCH_GRID[b][1] === c) {
            branchIdx = b;
            break;
          }
        }
        const cell = document.createElement('div');
        cell.className = 'palace-cell';
        cell.dataset.branch = branchIdx;
        cell.innerHTML =
          '<div class="palace-header"><span class="palace-name"></span><span class="flow-roles"></span><span class="palace-branch"></span></div>' +
          '<div class="stars-area"></div>' +
          HORO_KEYS.map(h => '<div class="horo-info '+h.cls+'"></div>').join('');
        grid.appendChild(cell);
      }
    }
  }
}

// ─── Find Cell by Branch ───
function getCell(branchIdx) {
  return document.querySelector('.palace-cell[data-branch="'+branchIdx+'"]');
}

// ─── Render Chart ───
function renderChart(a) {
  if (!a) return;
  astrolabe = a;

  // Build palace lookup by earthly branch
  const palaceByBranch = {};
  a.palaces.forEach(p => {
    const idx = BRANCH_TO_INDEX[p.earthlyBranch];
    if (idx !== undefined) palaceByBranch[idx] = p;
  });

  // Render each palace cell
  for (let b = 0; b < 12; b++) {
    const cell = getCell(b);
    if (!cell) continue;
    const p = palaceByBranch[b];
    if (!p) continue;

    // Header
    cell.querySelector('.palace-name').textContent = p.name;
    cell.querySelector('.palace-branch').textContent = p.heavenlyStem + p.earthlyBranch;

    // Stars
    const sa = cell.querySelector('.stars-area');
    sa.innerHTML = '';
    const allStars = [...p.majorStars, ...p.minorStars, ...p.adjectiveStars];
    allStars.forEach(s => {
      const span = document.createElement('span');
      span.className = 'star ' + s.type;
      span.textContent = s.name;
      if (s.brightness) {
        const br = document.createElement('span');
        br.className = 'brightness';
        br.textContent = s.brightness;
        span.appendChild(br);
      }
      if (s.mutagen) {
        const tr = document.createElement('span');
        tr.className = 'transformed ' + s.mutagen;
        tr.textContent = s.mutagen;
        span.appendChild(tr);
      }
      // 自化 marker
      const rules = p.heavenlyStem ? SELF_TRANSFORM_RULES[p.heavenlyStem] : null;
      if (rules && rules[s.name]) {
        const st = document.createElement('span');
        st.className = 'self-transform';
        st.textContent = '自' + rules[s.name];
        st.style.display = 'none'; // hidden until 自化 toggle on
        span.appendChild(st);
      }
      sa.appendChild(span);
      sa.appendChild(document.createTextNode(' '));
    });
  }

  // Center cells
  const c00 = document.getElementById('center_1_1');
  const c01 = document.getElementById('center_1_2');
  const c10 = document.getElementById('center_2_1');
  const c11 = document.getElementById('center_2_2');
  
  // Chinese four pillars
  const pillars = a.chineseDate ? a.chineseDate.split(' ') : [];
  // rawDates.chineseDate has structure
  const raw = a.rawDates?.chineseDate;
  
  if (c00) {
    // Add '日' to lunar date
    const lunarDate = (a.lunarDate||'') + '日';
    // Calculate age from birth date
    const birthVal = document.getElementById('birthDate').value;
    let ageStr = '';
    if (birthVal) {
      const birth = new Date(birthVal);
      const now = new Date();
      let age = now.getFullYear() - birth.getFullYear();
      const mDiff = now.getMonth() - birth.getMonth();
      if (mDiff < 0 || (mDiff === 0 && now.getDate() < birth.getDate())) age--;
      ageStr = age + '歲';
    }
    c00.innerHTML = '<span class="main-info">'+ lunarDate +'</span>' +
      '<span class="sub-info">'+ ageStr +'</span>' +
      '<span class="sub-info">'+ (a.sign||'') +' · '+ (a.zodiac||'') +'</span>';
  }
  if (c01) {
    const yearPillar = raw?.yearly ? raw.yearly.join('') : pillars[0]||'';
    const monthPillar = raw?.monthly ? raw.monthly.join('') : pillars[1]||'';
    const dayPillar = raw?.daily ? raw.daily.join('') : pillars[2]||'';
    const hourPillar = raw?.hourly ? raw.hourly.join('') : pillars[3]||'';
    c01.innerHTML = '<span class="year-col">'+ yearPillar +'年 '+ monthPillar +'月</span><br><span class="year-col">'+ dayPillar +'日 '+ hourPillar +'時</span>';
  }
  if (c10) {
    c10.innerHTML = '<span class="main-info">'+ (a.fiveElementsClass||'') +'</span>' +
      '<span class="sub-info">'+ (a.soul||'') +' · 身('+ a.earthlyBranchOfBodyPalace +')</span>' +
      '<span class="sub-info">'+ (a.body||'') +'</span>';
  }
  if (c11) {
    // 目標時間（與下拉選單一致）
    const dt = document.getElementById('targetDate')?.value || '';
    const hourSel = document.getElementById('targetHour');
    const hourText = hourSel ? hourSel.options[hourSel.selectedIndex]?.text || '' : '';
    const dateStr = dt.replace(/-/g, '/');
    c11.innerHTML = '<span class="main-info" style="font-size:.82rem">'+ dateStr +'</span> ' +
      '<span class="year-col" style="font-size:.8rem">'+ hourText +'</span>';
  }
}

// ─── Update Horoscope ───
function updateHoroscope(targetDateStr) {
  const horoEls = document.querySelectorAll('.horo-info');
  horoEls.forEach(el => { el.innerHTML = ''; });
  document.querySelectorAll('.flow-roles').forEach(el => { el.innerHTML = ''; });

  if (!astrolabe || !targetDateStr) return;

  try {
    const result = astrolabe.horoscope(targetDateStr);
    horoscopeResult = result;
  } catch(e) {
    console.error('horoscope error:', e);
    return;
  }

  // 大限 (decadal): show ALL palaces' decade info
  const decadalScope = horoscopeResult.decadal;
  if (decadalScope && astrolabe.palaces) {
    astrolabe.palaces.forEach((palace, idx) => {
      if (!palace.decadal || !palace.decadal.range) return;
      const branchIdx = BRANCH_TO_INDEX[palace.earthlyBranch];
      if (branchIdx === undefined) return;
      const cell = getCell(branchIdx);
      if (!cell) return;
      const infoEl = cell.querySelector('.horo-info.daxian');
      if (!infoEl) return;

      let content = '<span class="horo-label">大限</span> ';
      if (decadalScope.index === idx) {
        content += '<span class="horo-value" style="font-weight:700">' +
          (decadalScope.heavenlyStem || '') + (decadalScope.earthlyBranch || '') + '</span>';
      }
      content += ' <span class="horo-value">' + palace.decadal.range[0] + '-' + palace.decadal.range[1] + '歲</span>';
      infoEl.innerHTML = content;
    });
  }

  // Other scope types
  HORO_KEYS.forEach(hk => {
    if (hk.key === 'decadal') return; // already handled above

    // 小限: show age list for ALL palaces (12-year cycle)
    if (hk.key === 'age') {
      const ageScope = horoscopeResult.age;
      if (!ageScope) return;
      astrolabe.palaces.forEach((palace, idx) => {
        if (!palace.ages || palace.ages.length === 0) return;
        const branchIdx = BRANCH_TO_INDEX[palace.earthlyBranch];
        if (branchIdx === undefined) return;
        const cell = getCell(branchIdx);
        if (!cell) return;
        const infoEl = cell.querySelector('.horo-info.xiaoxian');
        if (!infoEl) return;

        // Format ages as comma-separated list, capped at ages ≤ 110
        const displayAges = palace.ages.filter(a => a <= 110).join(', ');
        let content = '<span class="horo-label">小限</span> ';
        const isCurrent = idx === ageScope.index;
        const valueStyle = isCurrent ? 'font-weight:700' : '';
        content += '<span class="horo-value" style="' + valueStyle + '">' + displayAges + '歲</span>';
        infoEl.innerHTML = content;
      });
      return;
    }

    // Flow cycle scopes (流年/月/日/時): show ALL palaces with role names
    const scope = horoscopeResult[hk.key];
    if (!scope || scope.index === undefined || scope.index < 0) return;

    const FLOW_ROLES_CLOCKWISE = ['命宮','父母','福德','田宅','官祿','僕役','遷移','疾厄','財帛','子女','夫妻','兄弟'];
    const FLOW_ROLES_SHORT = ['命','父','福','田','官','僕','遷','疾','財','子','妻','兄'];
    const startPalace = astrolabe.palaces[scope.index];
    const startBranch = BRANCH_TO_INDEX[startPalace.earthlyBranch];
    if (startBranch === undefined) return;

    // Precompute value for the starting palace
    let startContent = '<span class="horo-label">' + hk.label + '</span> ';
    startContent += '<span class="horo-value">' + (scope.heavenlyStem || '') + (scope.earthlyBranch || '') + '</span>';
    if (scope.mutagen && scope.mutagen.length) {
      const m = scope.mutagen;
      let mStr = '';
      if (Array.isArray(m)) {
        const names = m.map(x => x.name || x.star || '').filter(Boolean).join(',');
        if (names) mStr = names;
      }
      if (mStr) startContent += ' <span class="horo-label">四化: </span><span class="horo-value">' + mStr + '</span>';
    }

    astrolabe.palaces.forEach((palace) => {
      const branchIdx = BRANCH_TO_INDEX[palace.earthlyBranch];
      if (branchIdx === undefined) return;
      const cell = getCell(branchIdx);
      if (!cell) return;
      const infoEl = cell.querySelector('.horo-info.' + hk.cls);
      if (!infoEl) return;

      const offset = (branchIdx - startBranch + 12) % 12;
      const roleName = FLOW_ROLES_CLOCKWISE[offset];

      // Set flow role name in header
      const flowRoles = cell.querySelector('.flow-roles');
      if (flowRoles) {
        const existing = flowRoles.querySelector('.' + hk.cls);
        const span = existing || document.createElement('span');
        span.className = 'flow-role ' + hk.cls;
        span.innerHTML = '<span class="full">' + roleName + '</span><span class="short">' + FLOW_ROLES_SHORT[offset] + '</span>';
        // Toggle visibility based on checkbox
        const cb = document.getElementById(hk.id);
        span.style.display = (cb && cb.checked) ? 'inline' : 'none';
        if (!existing) flowRoles.appendChild(span);
      }

      if (offset === 0) {
        infoEl.innerHTML = startContent;
      } else {
        infoEl.innerHTML = ''; // role name now in header, clear horo-info
      }
    });

    // Clear ALL existing flow 四化 markers for this flow type (prevents stale markers after recalc)
    document.querySelectorAll('.flow-mutagen.' + hk.cls).forEach(el => el.remove());

    // Add flow 四化 markers to stars
    if (scope.heavenlyStem && scope.mutagen && Array.isArray(scope.mutagen) && scope.mutagen.length) {
      const rules = SELF_TRANSFORM_RULES[scope.heavenlyStem];
      scope.mutagen.forEach(starName => {
        if (!starName || !rules || !rules[starName]) return;
        const mutagenType = rules[starName]; // 祿/權/科/忌
        // Find this star in palace cells and add flow-colored marker
        astrolabe.palaces.forEach(palace => {
          const hasStar = palace.majorStars?.some(s => s.name === starName)
                       || palace.minorStars?.some(s => s.name === starName);
          if (!hasStar) return;
          const bIdx = BRANCH_TO_INDEX[palace.earthlyBranch];
          const cell = getCell(bIdx);
          if (!cell) return;
          const starEls = cell.querySelectorAll('.star');
          for (const se of starEls) {
            if (se.textContent.trim().startsWith(starName)) {
              // Remove existing marker for this flow type
              const old = se.querySelector('.flow-mutagen.' + hk.cls);
              if (old) old.remove();
              // Add new marker
              const fm = document.createElement('span');
              fm.className = 'flow-mutagen ' + hk.cls;
              fm.textContent = mutagenType;
              // Visibility: follow flow checkbox state
              const cb = document.getElementById(hk.id);
              fm.style.display = (cb && cb.checked) ? 'inline' : 'none';
              se.appendChild(fm);
              break;
            }
          }
        });
      });
    }
  });
}

// ─── Toggles ───
function setupToggles() {
  HORO_KEYS.forEach(hk => {
    const cb = document.getElementById(hk.id);
    if (!cb) return;
    cb.addEventListener('change', function() {
      document.querySelectorAll('.horo-info.' + hk.cls).forEach(el => {
        el.classList.toggle('show', this.checked);
      });
      // Toggle flow role in header
      document.querySelectorAll('.flow-role.' + hk.cls).forEach(el => {
        el.style.display = this.checked ? 'inline' : 'none';
      });
      // Also toggle flow 四化 markers on stars
      document.querySelectorAll('.flow-mutagen.' + hk.cls).forEach(el => {
        el.style.display = this.checked ? 'inline' : 'none';
      });
    });
  });
  // 四化 toggle: show/hide .transformed
  const chkZihua = document.getElementById('chkZihua');
  if (chkZihua) {
    chkZihua.addEventListener('change', function() {
      document.querySelectorAll('.transformed').forEach(el => {
        el.style.display = this.checked ? 'inline' : 'none';
      });
    });
  }
  // 自化 toggle: show/hide .self-transform
  const chkSelf = document.getElementById('chkSelfTransform');
  if (chkSelf) {
    chkSelf.addEventListener('change', function() {
      document.querySelectorAll('.self-transform').forEach(el => {
        el.style.display = this.checked ? 'inline' : 'none';
      });
    });
  }
}



// ─── Calculate ───
function calculate() {
  const gender = document.querySelector('input[name="gender"]:checked').value;
  const birthDate = document.getElementById('birthDate').value;
  const birthHour = parseInt(document.getElementById('birthHour').value);
  const alertEl = document.getElementById('alertMsg');
  alertEl.classList.remove('show');
  if (!birthDate) { alertEl.textContent = '請選擇出生日期'; alertEl.classList.add('show'); return; }
  try {
    const a = iztro.astro.bySolar(birthDate, birthHour, gender === '1' ? '男' : '女', true, 'zh-TW');
    renderChart(a);
    runPrediction(true);
  } catch(e) {
    console.error(e);
    alertEl.textContent = '排盤錯誤：'+e.message;
    alertEl.classList.add('show');
  }
}

function runPrediction(force) {
  if (!astrolabe) return;
  const targetDate = document.getElementById('targetDate').value;
  if (!targetDate) return;
  const branchIdx = parseInt(document.getElementById('targetHour').value);
  const startHour = branchIdx === 0 ? 0 : branchIdx === 12 ? 23 : branchIdx * 2 - 1;
  updateHoroscope(targetDate + ' ' + String(startHour).padStart(2,'0') + ':00');
  // Also update center_2_2 target time display
  const c11 = document.getElementById('center_2_2');
  if (c11) {
    const hourSel = document.getElementById('targetHour');
    const hourText = hourSel ? hourSel.options[hourSel.selectedIndex]?.text || '' : '';
    const dateStr = targetDate.replace(/-/g, '/');
    c11.innerHTML = '<span class="main-info" style="font-size:.82rem">'+ dateStr +'</span> ' +
      '<span class="year-col" style="font-size:.8rem">'+ hourText +'</span>';
  }
  // Re-apply toggle states
  HORO_KEYS.forEach(hk => {
    const cb = document.getElementById(hk.id);
    if (cb && cb.checked) {
      document.querySelectorAll('.horo-info.'+hk.cls).forEach(el => el.classList.add('show'));
      document.querySelectorAll('.flow-role.'+hk.cls).forEach(el => { el.style.display = 'inline'; });
      document.querySelectorAll('.flow-mutagen.'+hk.cls).forEach(el => { el.style.display = 'inline'; });
    }
  });
  // Re-apply 四化 / 自化 states
  if (document.getElementById('chkZihua').checked) {
    document.querySelectorAll('.transformed').forEach(el => { el.style.display = 'inline'; });
  }
  if (document.getElementById('chkSelfTransform').checked) {
    document.querySelectorAll('.self-transform').forEach(el => { el.style.display = 'inline'; });
  }
}

// ─── Init ───
document.addEventListener('DOMContentLoaded', function() {
  buildGrid();
  setupToggles();

  document.getElementById('calcBtn').addEventListener('click', calculate);
  document.getElementById('targetDate').addEventListener('change', function() { runPrediction(); });
  document.getElementById('targetHour').addEventListener('change', function() { runPrediction(false); });

  const now = new Date();
  const todayStr = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
  document.getElementById('birthDate').value = todayStr;
  document.getElementById('targetDate').value = todayStr;
  // Snap current hour to 時辰 index (0-12)
  const h24 = now.getHours();
  const snapIndex = h24 === 0 ? 0 : h24 === 23 ? 12 : Math.floor((h24 + 1) / 2);
  document.getElementById('birthHour').value = snapIndex;
  document.getElementById('targetHour').value = snapIndex;
  calculate();
});

// ─── 上一個 / 下一個 時辰按鈕 ───
document.getElementById('prevHourBtn').addEventListener('click', function() {
  const sel = document.getElementById('targetHour');
  const dateInput = document.getElementById('targetDate');
  const curVal = parseInt(sel.value);
  const maxVal = 12;
  if (curVal === 0) {
    // 從早子跨日到前一天的夜子
    sel.value = maxVal;
    const d = new Date(dateInput.value);
    d.setDate(d.getDate() - 1);
    dateInput.value = d.toISOString().slice(0, 10);
  } else {
    sel.value = curVal - 1;
  }
  calculate();
});

document.getElementById('nextHourBtn').addEventListener('click', function() {
  const sel = document.getElementById('targetHour');
  const dateInput = document.getElementById('targetDate');
  const curVal = parseInt(sel.value);
  const maxVal = 12;
  if (curVal === maxVal) {
    // 從夜子跨日到後一天的早子
    sel.value = 0;
    const d = new Date(dateInput.value);
    d.setDate(d.getDate() + 1);
    dateInput.value = d.toISOString().slice(0, 10);
  } else {
    sel.value = curVal + 1;
  }
  calculate();
});
